<div class="chat-container">
    <div class="chat-main">
        <!-- Chat History -->
        <div class="chat-history" id="chat-history-list">
            <div class="message-bubble agent">
                <div class="bubble-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="bubble-content">
                    <p>Hello! I am your RAG assistant. Ask me questions about the papers indexed in the database (e.g. details about Disdukcapil chatbot or reliability gaps).</p>
                </div>
            </div>
        </div>

        <!-- Chat Suggestions -->
        <div class="chat-suggestions">
            <span class="suggestion-tag" onclick="useSuggestion('Who authored the paper \'Operationalizing Reliability Gaps in Large Language Models\'?')">
                <i class="fa-solid fa-user-group"></i> Authors Query
            </span>
            <span class="suggestion-tag" onclick="useSuggestion('What is the summary of the paper \'Metode Retrieval-Augmented Generation dalam Pengembangan Chatbot Large Language Model pada Service Informasi Publik Disdukcapil Anambas\'?')">
                <i class="fa-solid fa-circle-info"></i> Summary Query
            </span>
            <span class="suggestion-tag" onclick="useSuggestion('Search for papers about chatbot implementation in public service.')">
                <i class="fa-solid fa-magnifying-glass"></i> Semantic Search
            </span>
        </div>

        <!-- Chat Input Form -->
        <form class="chat-input-form" id="chat-form">
            <input type="text" id="chat-input" placeholder="Ask a question about the indexed papers..." required autocomplete="off">
            <button type="submit" class="send-button" id="chat-send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>
